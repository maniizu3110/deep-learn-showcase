<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Learn Showcase</title>
    <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&f[]=satoshi@400,500,700&display=swap">
    <style>
        :root {
            --bg-primary: #1a1b26;
            --bg-secondary: #24283b;
            --bg-tertiary: #292e42;
            --bg-elevated: #414868;
            --bg-card: rgba(36, 40, 59, 0.7);
            --text-primary: #c0caf5;
            --text-secondary: #a9b1d6;
            --text-muted: #565f89;
            --text-dark: #15161e;
            --blue: #7aa2f7;
            --blue-glow: rgba(122, 162, 247, 0.25);
            --blue-subtle: rgba(122, 162, 247, 0.10);
            --cyan: #7dcfff;
            --cyan-glow: rgba(125, 207, 255, 0.25);
            --purple: #bb9af7;
            --purple-glow: rgba(187, 154, 247, 0.25);
            --green: #9ece6a;
            --green-glow: rgba(158, 206, 106, 0.25);
            --yellow: #e0af68;
            --yellow-glow: rgba(224, 175, 104, 0.25);
            --red: #f7768e;
            --red-glow: rgba(247, 118, 142, 0.25);
            --orange: #ff9e64;
            --orange-glow: rgba(255, 158, 100, 0.25);
            --border-subtle: rgba(192, 202, 245, 0.08);
            --border-default: rgba(192, 202, 245, 0.15);
            --border-accent: rgba(122, 162, 247, 0.3);
            --gradient-blue-purple: linear-gradient(135deg, var(--blue), var(--purple));
            --gradient-cyan-blue: linear-gradient(135deg, var(--cyan), var(--blue));
            --gradient-full: linear-gradient(90deg, var(--blue), var(--cyan), var(--green), var(--yellow), var(--orange), var(--red), var(--purple));
            --font-display: 'Clash Display', sans-serif;
            --font-body: 'Satoshi', sans-serif;
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --duration-normal: 0.6s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: var(--font-body);
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* === DECORATIVE BACKGROUND === */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 30%, var(--blue-subtle) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, var(--purple-glow) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }

        /* === GRID BACKGROUND === */
        .grid-bg {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(var(--border-subtle) 1px, transparent 1px),
                linear-gradient(90deg, var(--border-subtle) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        /* === TOP BAR === */
        .top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: var(--gradient-full);
            z-index: 100;
        }

        /* === MAIN CONTAINER === */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
            padding: clamp(2rem, 5vw, 4rem);
            padding-top: clamp(3rem, 8vw, 6rem);
        }

        /* === HEADER === */
        .header {
            text-align: center;
            margin-bottom: clamp(3rem, 6vw, 5rem);
        }
        .badge {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 0.5rem 1.5rem;
            border-radius: 100px;
            margin-bottom: 1.5rem;
            display: inline-flex;
            color: var(--cyan);
            border: 1px solid rgba(125, 207, 255, 0.3);
        }
        .header h1 {
            font-family: var(--font-display);
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 1rem;
        }
        .gt-blue-purple {
            background: var(--gradient-blue-purple);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .subtitle {
            font-size: clamp(1rem, 2vw, 1.2rem);
            color: var(--text-secondary);
            max-width: 550px;
            margin: 0 auto;
            line-height: 1.6;
        }
        .color-bar {
            display: flex;
            gap: 0.5rem;
            margin-top: 2rem;
            justify-content: center;
        }
        .color-bar span {
            width: 40px;
            height: 5px;
            border-radius: 3px;
        }

        /* === CONTENT COUNT === */
        .content-count {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .content-count strong {
            color: var(--blue);
            font-weight: 600;
        }

        /* === CARD GRID === */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        /* === CONTENT CARD === */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 0;
            backdrop-filter: blur(10px);
            transition: border-color 0.3s, transform 0.3s var(--ease-out-expo), box-shadow 0.3s;
            overflow: hidden;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
            opacity: 0;
            transform: translateY(30px);
        }
        .card.visible {
            opacity: 1;
            transform: translateY(0);
            transition: opacity var(--duration-normal) var(--ease-out-expo),
                        transform var(--duration-normal) var(--ease-out-expo),
                        border-color 0.3s, box-shadow 0.3s;
        }
        .card:hover {
            border-color: var(--border-default);
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }

        /* Card top accent bar */
        .card-accent {
            height: 3px;
            width: 100%;
        }

        /* Card body */
        .card-body {
            padding: 1.75rem 2rem 2rem;
        }

        /* Card meta row */
        .card-meta {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }
        .card-category {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 0.3rem 0.8rem;
            border-radius: 100px;
        }
        .card-time {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        /* Card title */
        .card h3 {
            font-family: var(--font-display);
            font-size: 1.35rem;
            font-weight: 600;
            margin-bottom: 0.6rem;
            line-height: 1.3;
        }

        /* Card description */
        .card p {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* Card arrow */
        .card-arrow {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1.25rem;
            font-size: 0.8rem;
            font-weight: 600;
            transition: gap 0.3s var(--ease-out-expo);
        }
        .card:hover .card-arrow {
            gap: 0.85rem;
        }
        .card-arrow svg {
            width: 16px;
            height: 16px;
            transition: transform 0.3s var(--ease-out-expo);
        }
        .card:hover .card-arrow svg {
            transform: translateX(3px);
        }

        /* === COLOR VARIANTS === */
        .color-blue .card-accent { background: var(--blue); }
        .color-blue .card-category { color: var(--blue); border: 1px solid rgba(122, 162, 247, 0.3); }
        .color-blue h3 { color: var(--blue); }
        .color-blue .card-arrow { color: var(--blue); }
        .color-blue:hover { box-shadow: 0 12px 40px rgba(122, 162, 247, 0.1); }

        .color-cyan .card-accent { background: var(--cyan); }
        .color-cyan .card-category { color: var(--cyan); border: 1px solid rgba(125, 207, 255, 0.3); }
        .color-cyan h3 { color: var(--cyan); }
        .color-cyan .card-arrow { color: var(--cyan); }
        .color-cyan:hover { box-shadow: 0 12px 40px rgba(125, 207, 255, 0.1); }

        .color-green .card-accent { background: var(--green); }
        .color-green .card-category { color: var(--green); border: 1px solid rgba(158, 206, 106, 0.3); }
        .color-green h3 { color: var(--green); }
        .color-green .card-arrow { color: var(--green); }
        .color-green:hover { box-shadow: 0 12px 40px rgba(158, 206, 106, 0.1); }

        .color-purple .card-accent { background: var(--purple); }
        .color-purple .card-category { color: var(--purple); border: 1px solid rgba(187, 154, 247, 0.3); }
        .color-purple h3 { color: var(--purple); }
        .color-purple .card-arrow { color: var(--purple); }
        .color-purple:hover { box-shadow: 0 12px 40px rgba(187, 154, 247, 0.1); }

        .color-yellow .card-accent { background: var(--yellow); }
        .color-yellow .card-category { color: var(--yellow); border: 1px solid rgba(224, 175, 104, 0.3); }
        .color-yellow h3 { color: var(--yellow); }
        .color-yellow .card-arrow { color: var(--yellow); }
        .color-yellow:hover { box-shadow: 0 12px 40px rgba(224, 175, 104, 0.1); }

        .color-red .card-accent { background: var(--red); }
        .color-red .card-category { color: var(--red); border: 1px solid rgba(247, 118, 142, 0.3); }
        .color-red h3 { color: var(--red); }
        .color-red .card-arrow { color: var(--red); }
        .color-red:hover { box-shadow: 0 12px 40px rgba(247, 118, 142, 0.1); }

        .color-orange .card-accent { background: var(--orange); }
        .color-orange .card-category { color: var(--orange); border: 1px solid rgba(255, 158, 100, 0.3); }
        .color-orange h3 { color: var(--orange); }
        .color-orange .card-arrow { color: var(--orange); }
        .color-orange:hover { box-shadow: 0 12px 40px rgba(255, 158, 100, 0.1); }

        /* === EMPTY STATE === */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }
        .empty-state p {
            font-size: 1rem;
            line-height: 1.6;
        }

        /* === FOOTER === */
        .footer {
            text-align: center;
            padding: 3rem 0;
            margin-top: 3rem;
            border-top: 1px solid var(--border-subtle);
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        /* === RESPONSIVE === */
        @media (max-width: 768px) {
            .card-grid {
                grid-template-columns: 1fr;
            }
        }

        /* === REDUCED MOTION === */
        @media (prefers-reduced-motion: reduce) {
            .card {
                opacity: 1;
                transform: none;
                transition: border-color 0.3s, box-shadow 0.3s;
            }
            .card:hover {
                transform: none;
            }
        }
    </style>
</head>
<body>

<div class="grid-bg"></div>
<div class="top-bar"></div>

<div class="container">
    <!-- Header -->
    <header class="header">
        <div class="badge">Learning Materials</div>
        <h1><span class="gt-blue-purple">Deep Learn</span> Showcase</h1>
        <p class="subtitle">暗記ではなく理解するための学習教材コレクション</p>
        <div class="color-bar">
            <span style="background: var(--blue);"></span>
            <span style="background: var(--cyan);"></span>
            <span style="background: var(--green);"></span>
            <span style="background: var(--yellow);"></span>
            <span style="background: var(--orange);"></span>
            <span style="background: var(--red);"></span>
            <span style="background: var(--purple);"></span>
        </div>
    </header>

    <!-- Content count -->
    <div class="content-count" id="content-count"></div>

    <!-- Card grid (dynamically populated) -->
    <div class="card-grid" id="card-grid"></div>

    <!-- Footer -->
    <footer class="footer">
        Deep Learn Showcase
    </footer>
</div>

<script>
(function () {
    const ARROW_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>';

    function createCard(item) {
        const a = document.createElement('a');
        a.href = item.path;
        a.className = 'card color-' + (item.color || 'blue');

        a.innerHTML =
            '<div class="card-accent"></div>' +
            '<div class="card-body">' +
                '<div class="card-meta">' +
                    '<span class="card-category">' + escapeHtml(item.category) + '</span>' +
                    (item.time ? '<span class="card-time">' + escapeHtml(item.time) + '</span>' : '') +
                '</div>' +
                '<h3>' + escapeHtml(item.title) + '</h3>' +
                '<p>' + escapeHtml(item.description) + '</p>' +
                '<div class="card-arrow">Start Learning ' + ARROW_SVG + '</div>' +
            '</div>';

        return a;
    }

    function escapeHtml(str) {
        var d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
    }

    function animateCards() {
        var cards = document.querySelectorAll('.card');
        cards.forEach(function (card, i) {
            setTimeout(function () {
                card.classList.add('visible');
            }, 100 + i * 80);
        });
    }

    function render(items) {
        var grid = document.getElementById('card-grid');
        var count = document.getElementById('content-count');

        if (!items || items.length === 0) {
            grid.innerHTML = '<div class="empty-state"><p>コンテンツはまだありません</p></div>';
            return;
        }

        count.innerHTML = '<strong>' + items.length + '</strong> contents available';

        items.forEach(function (item) {
            grid.appendChild(createCard(item));
        });

        requestAnimationFrame(animateCards);
    }

    fetch('contents.json')
        .then(function (res) { return res.json(); })
        .then(render)
        .catch(function () {
            document.getElementById('card-grid').innerHTML =
                '<div class="empty-state"><p>コンテンツの読み込みに失敗しました</p></div>';
        });
})();
</script>

</body>
</html>
